services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_realtime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat-network

  backend:
    build: ./server
    env_file:
      - ./server/.env.docker
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - chat-network

  frontend:
    build: ./client
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - chat-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    networks:
      - chat-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - chat-network

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    ports:
      - "3002:3001"
    depends_on:
      - backend
      - frontend
    networks:
      - chat-network

volumes:
  postgres_data:

networks:
  chat-network:
    driver: bridge
